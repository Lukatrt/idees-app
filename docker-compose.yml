version: '3.8'

services:
  idees-app:
    build: .
    container_name: idees_pwa
    ports:
      - "8289:8289"
    volumes:
      - idees-data:/app/data
    restart: unless-stopped

  fence-visualizer:
    build:
      context: .
      dockerfile: Dockerfile.fence
    container_name: fence_visualizer
    ports:
      - "9876:80"
    restart: unless-stopped

volumes:
  idees-data:
